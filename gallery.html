<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery Ican & Iara</title>

<style>
body{
    margin:0;
    font-family:Poppins,sans-serif;
    background:#f8f8f8;
}

.navbar{
    background:black;
    padding:20px;
    display:flex;
    justify-content:center;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin:0 20px;
}

h1{
    text-align:center;
    margin:40px 0;
}

.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.gallery img{
    width:300px;
    height:350px;
    object-fit:cover;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
.couple-container{
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
}

.bio-card{
    background:#f7eddc;
    width:420px;
    padding:30px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    transition:0.3s;
}

.bio-card:hover{
    transform:translateY(-10px);
}

.bio-card img{
    width:150px;
    height:150px;
    object-fit:contain;
    margin-bottom:20px;
}

.bio-card h3{
    font-size:2rem;
    color:#6d4c41;
    margin-bottom:15px;
}

.bio-card p{
    color:#555;
    line-height:1.8;
    margin-bottom:20px;
}

.bio-card ul{
    list-style:none;
}

.bio-card ul li{
    padding:8px;
    color:#444;
    font-size:1rem;
}

@media(max-width:768px){

    .section-title{
        font-size:2rem;
    }

    .bio-card{
        width:100%;
    }
</style>
</head>
